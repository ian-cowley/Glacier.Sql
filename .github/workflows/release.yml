name: Publish Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    name: Build, Test & Publish
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact_name: Glacier.Sql.Host-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            artifact_name: Glacier.Sql.Host-linux-x64.tar.gz
          - os: macos-latest
            rid: osx-x64
            artifact_name: Glacier.Sql.Host-osx-x64.tar.gz

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Polaris
        uses: actions/checkout@v4
        with:
          repository: ian-cowley/Glacier.Polaris
          path: ../Glacier.Polaris

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Glacier.Sql.Host/Glacier.Sql.Host.csproj

      - name: Build and Test
        run: dotnet test tests/Glacier.Sql.Tests/Glacier.Sql.Tests.csproj -c Release

      - name: Publish Binaries
        run: dotnet publish src/Glacier.Sql.Host/Glacier.Sql.Host.csproj -c Release -r ${{ matrix.rid }} -p:PublishSingleFile=true --self-contained true -o ./publish

      - name: Package Release Assets (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ./publish/* -DestinationPath ./${{ matrix.artifact_name }}

      - name: Package Release Assets (Non-Windows)
        if: matrix.os != 'windows-latest'
        run: tar -czf ./${{ matrix.artifact_name }} -C ./publish .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rid }}-binary
          path: ./${{ matrix.artifact_name }}

  release:
    name: Create GitHub Release & Push NuGet Package
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Polaris
        uses: actions/checkout@v4
        with:
          repository: ian-cowley/Glacier.Polaris
          path: ../Glacier.Polaris

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Pack NuGet Package
        run: dotnet pack src/Glacier.Sql/Glacier.Sql.csproj -c Release -o ./nuget

      - name: Publish NuGet Package
        run: dotnet nuget push ./nuget/*.nupkg -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Glacier.Sql.Host-win-x64.zip
            Glacier.Sql.Host-linux-x64.tar.gz
            Glacier.Sql.Host-osx-x64.tar.gz
            nuget/*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
